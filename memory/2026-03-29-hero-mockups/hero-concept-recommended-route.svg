<svg width="1440" height="960" viewBox="0 0 1440 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgRoute" x1="160" y1="96" x2="1280" y2="864" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#EAF5FF"/>
    </linearGradient>
    <linearGradient id="ctaRoute" x1="0" y1="0" x2="220" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E88E5"/>
      <stop offset="1" stop-color="#0B63CE"/>
    </linearGradient>
    <linearGradient id="mediaSky" x1="992" y1="140" x2="1172" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DDF0FF"/>
      <stop offset="1" stop-color="#F8FBFF"/>
    </linearGradient>
    <linearGradient id="mediaSea" x1="948" y1="556" x2="1288" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4AB4FF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#1E88E5" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="shadowSoft" x="0" y="0" width="1440" height="960" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#1E88E5" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1440" height="960" fill="#FFFFFF"/>
  <rect x="32" y="24" width="1376" height="912" rx="32" fill="url(#bgRoute)"/>
  <circle cx="1214" cy="146" r="132" fill="#4AB4FF" fill-opacity="0.08"/>
  <circle cx="178" cy="822" r="188" fill="#1E88E5" fill-opacity="0.05"/>

  <rect x="112" y="64" width="96" height="40" rx="20" fill="#FFFFFF" stroke="rgba(15,23,42,0.08)"/>
  <circle cx="138" cy="84" r="8" fill="#1E88E5"/>
  <path d="M138 78V90" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <path d="M132 84H144" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <text x="160" y="89" fill="#0F172A" font-size="17" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="700">떠나볼래?</text>

  <text x="112" y="206" fill="#1254C7" font-size="20" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="700">로그인 없이 바로 시작</text>
  <text x="112" y="306" fill="#0F172A" font-size="74" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="800" letter-spacing="-3.2">
    <tspan x="112" dy="0">이번 휴가,</tspan>
    <tspan x="112" dy="84">어디로 가야 할지</tspan>
    <tspan x="112" dy="84">덜 헤매게.</tspan>
  </text>
  <text x="112" y="576" fill="#5F6B7A" font-size="26" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="500">
    <tspan x="112" dy="0">동행, 일정, 예산, 분위기만 고르면</tspan>
    <tspan x="112" dy="40">지금 맞는 해외 목적지를 설명과 함께 바로 추천해 드려요.</tspan>
  </text>

  <rect x="112" y="652" width="244" height="64" rx="32" fill="url(#ctaRoute)" filter="url(#shadowSoft)"/>
  <text x="163" y="692" fill="white" font-size="22" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="800">내 여행 추천 받기</text>

  <text x="112" y="778" fill="#0F172A" fill-opacity="0.82" font-size="16" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="700">조건 5개</text>
  <circle cx="188" cy="772" r="3" fill="#C7D7E8"/>
  <text x="202" y="778" fill="#0F172A" fill-opacity="0.82" font-size="16" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="700">설명 가능한 추천</text>
  <circle cx="346" cy="772" r="3" fill="#C7D7E8"/>
  <text x="360" y="778" fill="#0F172A" fill-opacity="0.82" font-size="16" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="700">저장 링크 공유</text>

  <g filter="url(#shadowSoft)">
    <rect x="836" y="132" width="476" height="664" rx="34" fill="#FFFFFF" fill-opacity="0.84" stroke="rgba(30,136,229,0.18)"/>
    <rect x="868" y="164" width="412" height="368" rx="26" fill="url(#mediaSky)"/>
    <circle cx="1188" cy="236" r="46" fill="#FFFFFF" fill-opacity="0.88"/>
    <path d="M882 438C946 374 1010 362 1064 394C1116 424 1170 426 1266 350V532H882V438Z" fill="#D9EDFF"/>
    <path d="M868 502H1280V532H868V502Z" fill="#FFFFFF"/>
    <path d="M868 532H1280V734H868V532Z" fill="url(#mediaSea)"/>
    <path d="M928 504C960 476 998 472 1038 498C1088 530 1134 530 1188 488C1232 454 1258 448 1280 458V532H868V512C886 516 906 518 928 504Z" fill="#7BC5FF" fill-opacity="0.36"/>

    <path d="M936 618C1008 572 1092 572 1172 642" stroke="#1E88E5" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 14"/>
    <circle cx="936" cy="618" r="10" fill="#0B63CE"/>
    <circle cx="1172" cy="642" r="10" fill="#0B63CE"/>

    <rect x="906" y="570" width="102" height="42" rx="21" fill="#FFFFFF" stroke="rgba(15,23,42,0.08)"/>
    <text x="933" y="597" fill="#0F172A" font-size="16" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="700">서울 출발</text>
    <rect x="1138" y="652" width="94" height="42" rx="21" fill="#FFFFFF" stroke="rgba(15,23,42,0.08)"/>
    <text x="1169" y="679" fill="#0F172A" font-size="16" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="700">도쿄</text>

    <rect x="884" y="574" width="396" height="1" fill="rgba(15,23,42,0.08)"/>
    <text x="884" y="600" fill="#1254C7" font-size="15" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="700">이번 주 많이 찾는 흐름</text>
    <text x="884" y="638" fill="#0F172A" font-size="34" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="800" letter-spacing="-1.2">짧게 다녀와도 만족도 높은 도시 여행</text>
    <text x="884" y="676" fill="#5F6B7A" font-size="19" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="500">가까운 비행 · 먹거리 · 밤 산책 · 주말 일정</text>

    <rect x="884" y="708" width="120" height="40" rx="20" fill="#EDF7FF"/>
    <text x="917" y="734" fill="#0B63CE" font-size="15" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="700">2박 3일 추천</text>
    <rect x="1016" y="708" width="116" height="40" rx="20" fill="#F5FAFF" stroke="rgba(15,23,42,0.08)"/>
    <text x="1048" y="734" fill="#0F172A" font-size="15" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="700">설명 보기</text>
  </g>
</svg>
