  </defs>

  <rect width="1440" height="960" fill="#FFFFFF"/>
  <rect x="36" y="24" width="1368" height="912" rx="34" fill="url(#bgEditorial)"/>

  <rect x="632" y="86" width="176" height="42" rx="21" fill="#FFFFFF" stroke="rgba(15,23,42,0.08)"/>
  <text x="678" y="113" fill="#1254C7" font-size="17" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="700">떠나볼래? 추천 서비스</text>

  <text x="720" y="250" text-anchor="middle" fill="#0F172A" font-size="78" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="800" letter-spacing="-3.4">
    <tspan x="720" dy="0">이번 여행,</tspan>
    <tspan x="720" dy="88">고르는 시간부터</tspan>
    <tspan x="720" dy="88">가볍게.</tspan>
  </text>

  <text x="720" y="532" text-anchor="middle" fill="#5F6B7A" font-size="28" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="500">
    <tspan x="720" dy="0">한국에서 출발하는 여행자 기준으로</tspan>
    <tspan x="720" dy="42">일정, 비행 부담, 예산 감각에 맞는 목적지를 바로 추천해 드려요.</tspan>
  </text>

  <rect x="598" y="610" width="244" height="64" rx="32" fill="url(#ctaEditorial)"/>
  <text x="649" y="650" fill="white" font-size="22" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="800">추천 바로 받기</text>

  <text x="720" y="730" text-anchor="middle" fill="#0F172A" fill-opacity="0.82" font-size="17" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="700">질문은 짧게, 결과는 이유까지</text>

  <g>
