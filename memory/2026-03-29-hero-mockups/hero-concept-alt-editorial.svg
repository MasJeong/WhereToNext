<svg width="1440" height="960" viewBox="0 0 1440 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgEditorial" x1="720" y1="48" x2="720" y2="912" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBFDFF"/>
      <stop offset="1" stop-color="#EEF7FF"/>
    </linearGradient>
    <linearGradient id="bottomGlow" x1="720" y1="596" x2="720" y2="872" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4AB4FF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#1E88E5" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="ctaEditorial" x1="0" y1="0" x2="240" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E88E5"/>
      <stop offset="1" stop-color="#1254C7"/>
